<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BECOME A TDMER!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            position: relative;
            min-height: 100vh;
        }

        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(45deg, #ff0000, #00ff00, #0000ff, #ffff00, #ff00ff, #00ffff);
            background-size: 600% 600%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        header {
            position: relative;
            color: #fff;
            padding: 20px 0;
            text-align: center;
            height: 300px;
            overflow: hidden;
            z-index: 1;
        }

        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .header-content {
            position: relative;
            z-index: 1;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 5px;
        }

        nav {
            background: #ffffff;
            color: #fff;
            padding: 5px 0;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            padding: 5px 10px;
        }

        nav a:hover {
            background: #555;
        }

        .youtube-btn {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 5px;
        }

        .youtube-btn i {
            color: #ff0000;
            font-size: 20px;
        }

        .content {
            padding: 20px;
            background: #fff;
            margin: 20px 0;
            position: relative;
            z-index: 1;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .discord-button {
            display: inline-block;
            background: #7289da;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }

        .discord-button:hover {
            background: #5a6ebd;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        /* Floating particles effect */
        .particle {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        audio#bg-audio {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        /* Audio control button */
        .audio-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 3;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .audio-control:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: scale(1.1);
        }

        .audio-control i {
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="animated-background"></div>

    <audio id="bg-audio" loop>
        <source src="audio/Weiland - Blue Bands (Official Music Video).mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <button class="audio-control" id="audio-toggle">
        <i class="fas fa-volume-up"></i>
    </button>

    <header>
        <video autoplay muted loop class="video-background">
            <source src="https://cdn.discordapp.com/attachments/1445499508988575754/1520866017935364186/BEWARE.mp4?ex=6a42c05b&is=6a416edb&hm=28fbe4b9a462b504ec2bf8c975e2855a8f312cffce51dc2dc1be49ca7d1ac794&" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="header-content">
            <h1>BECOME A TDMER!</h1>
        </div>
    </header>

    <nav>
        <a href="#" id="youtube-btn" class="youtube-btn" title="YouTube">
            <i class="fab fa-youtube"></i>
        </a>
    </nav>

    <div class="container">
        <div class="content" id="youtube">
            <h2>Join The TDM Discord!</h2>
            <p>Click the button below to join our Discord server and connect with other players.</p>
            <a href="https://discord.gg/GXywEkzaJ4" class="discord-button" target="_blank">Join Discord</a>
        </div>

        <div class="content" id="settings">
            <h2>z2's settings</h2>
            <table id="game-settings">
                <thead>
                    <tr>
                        <th>Setting</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Game settings will be inserted here by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Example game settings (replace with actual data fetching logic)
        const gameSettings = {
            "Graphics": "All Cursed",
            "Resolution": "2560x1440",
            "FPS Cap": "uncapped",
            "FOV": "110",
            "Sensitivity": "1.2",
            "Aim Sensitivity": "1:1 ini or 10",
            "DPI": "400",
            "Polling Rate": "2000",
            "Mouse": "Razer Viper V3 Pro"
        };

        // Function to display game settings
        function displayGameSettings() {
            const tableBody = document.querySelector('#game-settings tbody');
            for (const [setting, value] of Object.entries(gameSettings)) {
                const row = document.createElement('tr');
                const settingCell = document.createElement('td');
                const valueCell = document.createElement('td');

                settingCell.textContent = setting;
                valueCell.textContent = value;

                row.appendChild(settingCell);
                row.appendChild(valueCell);
                tableBody.appendChild(row);
            }
        }

        // Call the function to display game settings
        displayGameSettings();

        // YouTube button functionality
        document.getElementById('youtube-btn').addEventListener('click', function() {
            window.open('https://www.youtube.com/@ZetaBay', '_blank');
        });

        // Background audio control
        const bgAudio = document.getElementById('bg-audio');
        const audioToggle = document.getElementById('audio-toggle');
        let isPlaying = false;

        // Play audio immediately
        function playAudio() {
            bgAudio.volume = 0.5;
            bgAudio.play().then(() => {
                isPlaying = true;
                audioToggle.innerHTML = '<i class="fas fa-volume-up"></i>';
            }).catch(error => {
                console.log('Audio playback failed:', error);
                isPlaying = false;
                audioToggle.innerHTML = '<i class="fas fa-volume-mute"></i>';
            });
        }

        // Toggle audio
        audioToggle.addEventListener('click', function() {
            if (isPlaying) {
                bgAudio.pause();
                isPlaying = false;
                audioToggle.innerHTML = '<i class="fas fa-volume-mute"></i>';
            } else {
                playAudio();
            }
        });

        // Create floating particles
        function createParticles() {
            const particleCount = 50;
            const body = document.body;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                // Random size between 2px and 8px
                const size = Math.random() * 6 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;

                // Random position
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;

                // Random animation duration between 5s and 15s
                const duration = Math.random() * 10 + 5;
                particle.style.animation = `float ${duration}s infinite ease-in-out`;

                // Random delay
                particle.style.animationDelay = `${Math.random() * 5}s`;

                body.appendChild(particle);
            }
        }

        // Particle animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float {
                0%, 100% {
                    transform: translateY(0) rotate(0deg);
                }
                50% {
                    transform: translateY(-20px) rotate(180deg);
                }
            }
        `;
        document.head.appendChild(style);

        // Initialize particles and audio when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            playAudio();

            // Handle audio end event
            bgAudio.addEventListener('ended', function() {
                this.currentTime = 0;
                this.play();
            });
        });
    </script>
</body>
</html>
